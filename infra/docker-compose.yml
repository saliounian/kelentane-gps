# Stack Kelentane — API façade Nest UNIQUEMENT.
#
# ⚠️ Traccar (cœur GPS) n'est PAS géré par ce compose. Il tourne dans sa PROPRE
# stack (infra/traccar/ en local, /root/traccar/ sur le VPS), sur le réseau
# Docker `traccar_default`. Déclarer un service `traccar` ICI recréait un 2ᵉ
# conteneur Traccar vide en DOUBLON du vrai (bug corrigé — voir docs/DEPLOY.md).
#
# L'API rejoint le réseau EXTERNE `traccar_default` et joint Traccar par son
# alias de service (http://traccar:8082). Ce réseau doit exister AVANT :
# démarrer la stack Traccar d'abord.
#
# Déploiement : voir docs/DEPLOY.md
#   docker compose -f infra/docker-compose.yml up -d --build

name: kelentane

services:
  api:
    build:
      context: ../api
    container_name: kelentane-api
    restart: unless-stopped
    env_file:
      - ../api/.env.production
    environment:
      # Traccar joint par alias de service sur le réseau externe traccar_default.
      - TRACCAR_URL=http://traccar:8082
      - PORT=3000
    ports:
      - "3000:3000" # API façade (consommée par le mobile)
    networks:
      - traccar_default
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# Réseau EXTERNE : créé par la stack Traccar (projet `traccar` → `traccar_default`).
# NE PAS le recréer ici. `up` échoue si la stack Traccar n'est pas démarrée avant.
networks:
  traccar_default:
    external: true
